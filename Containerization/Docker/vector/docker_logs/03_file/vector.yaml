sources:
  app_logs:
    type: docker_logs
    include_containers: ["demo-vector-app1"]

transforms:
  clean_logs:
    type: remap
    inputs: ["app_logs"]
    source: |
      .debug_source = "app_logs_source" 
      del(.container_created_at)
      del(.container_id)
      del(.host)
      del(.image)
      del(.label)
      del(.source_type)
      del(.stream)

sinks:
  rustfs:
    type: file
    inputs: ["clean_logs"]
    path: /tmp/logs/%Y-%m-%d.log
    encoding:
      codec: json
      pretty: false